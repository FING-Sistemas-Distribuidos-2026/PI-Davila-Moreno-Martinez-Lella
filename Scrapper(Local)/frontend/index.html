<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Precios Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <main class="container">
        <header class="header">
            <div class="nav-links" style="position: absolute; right: 20px; top: 20px;">
                <a href="history.html" class="nav-link" style="color: #6ee7b7; text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 0.5rem; background: rgba(110, 231, 183, 0.1); padding: 0.5rem 1rem; border-radius: 9999px; border: 1px solid rgba(110, 231, 183, 0.2); transition: all 0.3s ease;">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Historial
                </a>
            </div>
            <h1>Precio<span>Scout</span></h1>
            <p>Encuentra el mejor hardware al mejor precio</p>
        </header>

        <section class="search-section glass-panel">
            <form id="searchForm">
                <div class="search-input-wrapper">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input 
                        type="text" 
                        id="queryInput" 
                        placeholder="Ej: RTX 4060, Ryzen 5 5600..."
                        autocomplete="off"
                    >
                </div>
                
                <div class="scrapers-selection">
                    <p class="selection-title">Selecciona hasta 3 tiendas:</p>
                    <div class="checkbox-group">
                        <label class="custom-checkbox">
                            <input type="checkbox" name="scraper" value="compragamer" checked>
                            <span class="checkmark"></span>
                            CompraGamer
                        </label>
                        <label class="custom-checkbox">
                            <input type="checkbox" name="scraper" value="maximus" checked>
                            <span class="checkmark"></span>
                            Maximus
                        </label>
                        <label class="custom-checkbox">
                            <input type="checkbox" name="scraper" value="gamingcity" checked>
                            <span class="checkmark"></span>
                            Gaming City
                        </label>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="submitBtn">
                        <span>Buscar Precios</span>
                        <div class="loader hidden" id="searchLoader"></div>
                    </button>
                    <button type="button" class="btn-secondary" id="forceUpdateBtn" title="Forzar scraping (Ignorar caché)">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        <span>Actualizar</span>
                    </button>
                </div>
            </form>
        </section>

        <section class="status-section">
            <div id="statusBadge" class="status-badge hidden">
                <span class="pulse-dot"></span>
                <span id="status">Conectando...</span>
            </div>
            <div id="cachedBadge" class="cached-badge hidden">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span id="cachedText">Resultados en caché</span>
            </div>
        </section>

        <section id="filtersSection" class="filters-section hidden">
            <div class="filters-panel glass-panel">
                <div class="filters-header">
                    <div class="filters-title">
                        <span>Filtros</span>
                    </div>
                    <div class="filters-summary" id="filtersSummary">
                        <span id="totalResultsCount">0</span> resultados
                    </div>
                </div>

                <div class="filters-body">
                    <div class="filter-group">
                        <label class="filter-label" for="filterText">Buscar en resultados</label>
                        <div class="filter-input-wrapper">
                            <svg class="filter-search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                            <input type="text" id="filterText" placeholder="Ej: DDR5, 1TB, ASUS..." autocomplete="off">
                        </div>
                    </div>

                    <div class="filter-group filter-group-price">
                        <label class="filter-label">Rango de precio</label>
                        <div class="price-range-inputs">
                            <div class="price-input-wrapper">
                                <span class="price-prefix">$</span>
                                <input type="number" id="filterPriceMin" placeholder="Mín" min="0">
                            </div>
                            <span class="price-separator">—</span>
                            <div class="price-input-wrapper">
                                <span class="price-prefix">$</span>
                                <input type="number" id="filterPriceMax" placeholder="Máx" min="0">
                            </div>
                        </div>
                    </div>

                    <div class="filter-group">
                        <label class="filter-label" for="filterSort">Ordenar por</label>
                        <select id="filterSort" class="filter-select">
                            <option value="default">Orden original</option>
                            <option value="price-asc">Precio: menor a mayor</option>
                            <option value="price-desc">Precio: mayor a menor</option>
                            <option value="name-asc">Nombre: A → Z</option>
                            <option value="name-desc">Nombre: Z → A</option>
                        </select>
                    </div>

                    <div class="filter-group filter-group-actions">
                        <button type="button" class="btn-clear-filters" id="clearFiltersBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="16" height="16">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                            Limpiar filtros
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section class="results-section">
            <!-- Dynamic grid container for store columns -->
            <div id="resultsGrid" class="results-grid">
                <!-- Columns will be injected here by JS -->
            </div>
        </section>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
