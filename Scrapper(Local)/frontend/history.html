<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - PrecioScout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }
        .history-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }
        .history-card:hover {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .history-info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .history-query {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f8fafc;
        }
        .history-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.875rem;
            color: #94a3b8;
            align-items: center;
        }
        .history-status {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            background: rgba(110, 231, 183, 0.1);
            color: #6ee7b7;
            border: 1px solid rgba(110, 231, 183, 0.2);
        }
        .history-status.PROCESSING {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.2);
        }
        .empty-history {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 2rem;
            transition: color 0.2s ease;
        }
        .btn-back:hover {
            color: #f8fafc;
        }
    </style>
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <main class="container" style="max-width: 800px;">
        <header class="header" style="margin-bottom: 1rem;">
            <h1>Precio<span>Scout</span></h1>
            <p>Historial de búsquedas recientes</p>
        </header>

        <a href="index.html" class="btn-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Volver a la búsqueda
        </a>

        <section class="glass-panel" style="padding: 2rem;">
            <div id="loadingIndicator" class="empty-history">
                <div class="loader" style="margin: 0 auto 1rem auto; width: 30px; height: 30px; border-width: 3px;"></div>
                Cargando historial...
            </div>
            
            <div id="historyList" class="history-list hidden">
                <!-- Se inyectará por JS -->
            </div>
        </section>
    </main>
    
    <script src="history.js"></script>
</body>
</html>
