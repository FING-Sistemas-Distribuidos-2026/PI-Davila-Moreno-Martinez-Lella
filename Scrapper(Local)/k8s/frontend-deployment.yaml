apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: scraper-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: f4cundol3ll4/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http

          env:
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: scraper-config
                  key: BACKEND_URL
